<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飞书授权 · 博主建联系统</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'PingFang SC',sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; background:#0d0f14; color:#e8eaf2; }
  .card { text-align:center; padding:48px 40px; background:#141720; border-radius:20px; border:1px solid rgba(255,255,255,0.07); max-width:400px; width:90%; }
  .logo { font-size:40px; margin-bottom:16px; }
  h1 { font-size:22px; font-weight:700; margin-bottom:8px; }
  p { color:#6b7280; font-size:14px; line-height:1.8; margin-bottom:28px; }
  .btn { display:inline-block; padding:14px 36px; background:#5b7fff; color:#fff; border-radius:12px; text-decoration:none; font-size:15px; font-weight:600; transition:background .2s; }
  .btn:hover { background:#4a6ee8; }
  .note { margin-top:20px; font-size:12px; color:#4b5563; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🪶</div>
  <h1>飞羽博主建联系统</h1>
  <p>点击下方按钮，使用飞书账号授权。<br>授权后系统将自动获取访问权限，无需其他操作。</p>
  <a class="btn" href="/auth">飞书账号授权</a>
  <div class="note">授权信息仅用于读取博主建联表格数据</div>
</div>
</body>
</html>
